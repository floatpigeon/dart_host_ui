<svg width="1024" height="600" viewBox="0 0 1024 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="940" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101A20"/>
      <stop offset="1" stop-color="#0B1115"/>
    </linearGradient>
    <linearGradient id="topCard" x1="80" y1="20" x2="820" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A2A33"/>
      <stop offset="1" stop-color="#132029"/>
    </linearGradient>
    <linearGradient id="accentGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F97316" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#05080A" flood-opacity="0.32"/>
    </filter>
    <style>
      .title { font: 700 24px "DejaVu Sans", sans-serif; fill: #F2F5F7; }
      .h2 { font: 700 20px "DejaVu Sans", sans-serif; fill: #F2F5F7; }
      .h3 { font: 700 17px "DejaVu Sans", sans-serif; fill: #F2F5F7; }
      .body { font: 500 14px "DejaVu Sans", sans-serif; fill: #E6ECEF; }
      .small { font: 500 12px "DejaVu Sans", sans-serif; fill: #9FB0BA; }
      .metric { font: 700 25px "DejaVu Sans", sans-serif; fill: #F2F5F7; }
      .chip { font: 700 13px "DejaVu Sans", sans-serif; fill: #F5FFFB; }
      .button { font: 700 14px "DejaVu Sans", sans-serif; fill: #F6F8FA; text-anchor: middle; dominant-baseline: middle; }
      .rail { font: 700 15px "DejaVu Sans", sans-serif; fill: #F2F5F7; }
      .label { font: 600 12px "DejaVu Sans", sans-serif; fill: #9FB0BA; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="1024" height="600" fill="url(#bg)"/>
  <circle cx="868" cy="90" r="180" fill="url(#accentGlow)"/>
  <circle cx="130" cy="530" r="150" fill="#14303B" fill-opacity="0.18"/>

  <rect x="20" y="20" width="984" height="560" rx="30" fill="#0E151A" stroke="#1A2630"/>

  <g filter="url(#shadow)">
    <rect x="36" y="20" width="952" height="92" rx="20" fill="url(#topCard)" stroke="#304654"/>
    <rect x="58" y="44" width="104" height="30" rx="15" fill="#2D9F67"/>
    <text x="110" y="63" class="chip" text-anchor="middle" dominant-baseline="middle">Connected</text>
    <text x="178" y="60" class="title">RMCS Dart Host</text>
    <text x="58" y="90" class="body">rmcs-dart-bridge 0.1.0 on session sess-1</text>
    <text x="58" y="105" class="small">Last heartbeat 12:08:15</text>

    <rect x="741" y="42" width="92" height="40" rx="14" fill="#24323C"/>
    <text x="787" y="63" class="button">Retry Link</text>

    <rect x="846" y="42" width="70" height="40" rx="14" fill="#35506A"/>
    <text x="881" y="63" class="button">recover</text>

    <rect x="928" y="42" width="44" height="40" rx="14" fill="#D9485F"/>
    <text x="950" y="63" class="button">cancel</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="36" y="126" width="952" height="48" rx="18" fill="#3A1F1F" stroke="#8B2F39"/>
    <text x="56" y="149" class="h3" font-size="16">Connection / command issue</text>
    <text x="56" y="165" class="small" fill="#D4AAB0">No active fault in the preview, this strip appears only when the service reports an error.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="36" y="188" width="136" height="376" rx="18" fill="#152028" stroke="#314756"/>
    <text x="54" y="218" class="h2" font-size="18">Left Rail</text>
    <text x="54" y="238" class="small">Switch the control surface.</text>

    <rect x="48" y="258" width="112" height="72" rx="18" fill="#8A4B1E" stroke="#F97316"/>
    <text x="62" y="285" class="rail">Task Control</text>
    <text x="62" y="304" class="small">Live RMCS</text>
    <text x="62" y="319" class="small">commands</text>

    <rect x="48" y="342" width="112" height="72" rx="18" fill="#152028" stroke="#314756"/>
    <text x="62" y="369" class="rail">Step Control</text>
    <text x="62" y="388" class="small">Reserved six-step</text>
    <text x="62" y="403" class="small">actions</text>

    <rect x="48" y="426" width="112" height="72" rx="18" fill="#152028" stroke="#314756"/>
    <text x="62" y="453" class="rail">Manual</text>
    <text x="62" y="472" class="small">Pitch / yaw /</text>
    <text x="62" y="487" class="small">force skeleton</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="852" y="188" width="136" height="376" rx="18" fill="#152028" stroke="#314756"/>
    <text x="870" y="218" class="h2" font-size="18">Right Rail</text>
    <text x="870" y="238" class="small">Switch telemetry</text>
    <text x="870" y="253" class="small">and image panes.</text>

    <rect x="864" y="278" width="112" height="84" rx="18" fill="#8A4B1E" stroke="#F97316"/>
    <text x="878" y="307" class="rail">Device State</text>
    <text x="878" y="326" class="small">Manager snapshot</text>
    <text x="878" y="341" class="small">+ placeholders</text>

    <rect x="864" y="376" width="112" height="84" rx="18" fill="#152028" stroke="#314756"/>
    <text x="878" y="405" class="rail">Vision</text>
    <text x="878" y="424" class="small">Two reserved</text>
    <text x="878" y="439" class="small">4:3 frames</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="186" y="188" width="326" height="376" rx="18" fill="#152028" stroke="#314756"/>
    <text x="208" y="222" class="h2">Task Control</text>
    <text x="208" y="242" class="small">Only commands supported by hello_ack are enabled.</text>

    <rect x="208" y="264" width="282" height="82" rx="16" fill="#1B2A33" stroke="#314756"/>
    <text x="226" y="289" class="h3">Launch Prepare</text>
    <text x="226" y="308" class="small">Queue the RMCS launch-prepare workflow.</text>
    <text x="226" y="326" class="small">Ready</text>
    <rect x="390" y="286" width="82" height="38" rx="12" fill="#243845"/>
    <text x="431" y="305" class="button">Send</text>

    <rect x="208" y="358" width="282" height="82" rx="16" fill="#1B2A33" stroke="#314756"/>
    <text x="226" y="383" class="h3">Launch Cancel</text>
    <text x="226" y="402" class="small">Cancel the current launch pipeline inside RMCS.</text>
    <text x="226" y="420" class="small">Ready</text>
    <rect x="390" y="380" width="82" height="38" rx="12" fill="#243845"/>
    <text x="431" y="399" class="button">Send</text>

    <rect x="208" y="452" width="282" height="82" rx="16" fill="#1B2A33" stroke="#314756"/>
    <text x="226" y="477" class="h3">Fire Preload</text>
    <text x="226" y="496" class="small">Trigger the preload task already implemented in RMCS.</text>
    <text x="226" y="514" class="small">Ready</text>
    <rect x="390" y="474" width="82" height="38" rx="12" fill="#243845"/>
    <text x="431" y="493" class="button">Send</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="526" y="188" width="312" height="176" rx="18" fill="#152028" stroke="#314756"/>
    <text x="548" y="222" class="h2">Device Status</text>

    <rect x="548" y="244" width="126" height="46" rx="14" fill="#1B2A33" stroke="#314756"/>
    <text x="562" y="262" class="label">LIFECYCLE</text>
    <text x="562" y="282" class="metric" font-size="21">RUNNING</text>

    <rect x="690" y="244" width="126" height="46" rx="14" fill="#1B2A33" stroke="#314756"/>
    <text x="704" y="262" class="label">CURRENT TASK</text>
    <text x="704" y="282" class="metric" font-size="18">launch_prepare</text>

    <rect x="548" y="304" width="126" height="46" rx="14" fill="#1B2A33" stroke="#314756"/>
    <text x="562" y="322" class="label">CURRENT ACTION</text>
    <text x="562" y="342" class="metric" font-size="18">belt_up</text>

    <rect x="690" y="304" width="126" height="46" rx="14" fill="#1B2A33" stroke="#314756"/>
    <text x="704" y="322" class="label">FIRE COUNT</text>
    <text x="704" y="342" class="metric">1</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="526" y="378" width="312" height="98" rx="18" fill="#152028" stroke="#314756"/>
    <text x="548" y="410" class="h2">Raw Signals</text>
    <text x="548" y="430" class="small">Not wired in protocol v1</text>

    <rect x="548" y="442" width="84" height="22" rx="11" fill="#243845"/>
    <text x="590" y="456" class="chip" font-size="11" text-anchor="middle">pitch --</text>

    <rect x="646" y="442" width="84" height="22" rx="11" fill="#243845"/>
    <text x="688" y="456" class="chip" font-size="11" text-anchor="middle">ch1 --</text>

    <rect x="744" y="442" width="84" height="22" rx="11" fill="#243845"/>
    <text x="786" y="456" class="chip" font-size="11" text-anchor="middle">ch2 --</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="526" y="490" width="312" height="74" rx="18" fill="#152028" stroke="#314756"/>
    <text x="548" y="520" class="h2">Last Error</text>
    <text x="548" y="540" class="body" font-size="13">No RMCS error reported.</text>
  </g>
</svg>
